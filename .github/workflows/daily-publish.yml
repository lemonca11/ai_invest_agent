name: Daily MetaFinance publish

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-metafinance-publish
  cancel-in-progress: false

env:
  TZ: Asia/Shanghai
  LOOKBACK_HOURS: "30"
  RECENT_SIGNAL_HOURS: "168"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: python3 -m pip install --upgrade pip && python3 -m pip install -r requirements.txt

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Fetch sources
        run: python3 main.py

      - name: Check fetch quality
        run: |
          TODAY=$(date +%F)
          python3 - "data/raw_items_${TODAY}.json" <<'PY'
          import json
          import sys
          from pathlib import Path

          path = Path(sys.argv[1])
          if not path.exists():
              raise SystemExit(f"Missing raw items file: {path}")

          payload = json.loads(path.read_text(encoding="utf-8"))
          items = payload.get("items", [])
          failed = sum(1 for item in items if item.get("event_grade") == "failed_source")
          successful = len(items) - failed

          print(f"fetch quality: total={len(items)}, successful={successful}, failed={failed}")
          if not items:
              raise SystemExit("No fetched items; stop publish.")
          if successful == 0:
              raise SystemExit("All fetched items failed; stop publish.")
          PY

      - name: Generate daily report
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          KIMI_BASE_URL: ${{ secrets.KIMI_BASE_URL }}
          KIMI_MODEL: ${{ secrets.KIMI_MODEL }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          MOONSHOT_BASE_URL: ${{ secrets.MOONSHOT_BASE_URL }}
          MOONSHOT_MODEL: ${{ secrets.MOONSHOT_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          REPORT_TRANSLATION_TIMEOUT_SEC: "60"
        run: |
          TODAY=$(date +%F)
          python3 generate_local_report.py --date "$TODAY"

      - name: Update source iteration
        run: |
          TODAY=$(date +%F)
          python3 market_source_iterate.py --date "$TODAY"

      - name: Refresh market radar data
        run: python3 market_dashboard.py

      - name: Build static site
        run: python3 build_site.py

      - name: Commit generated daily artifacts
        run: |
          TODAY=$(date +%F)
          if git diff --quiet -- \
            "reports/${TODAY}.md" \
            "reports/news_details/${TODAY}" \
            "reports/source_iteration_${TODAY}.md" \
            "data/raw_items_${TODAY}.json" \
            config/source_candidates.yaml \
            config/source_health.yaml \
            data/market_close.csv \
            data/market_volume.csv \
            data/market_signals.csv \
            data/market_fetch_errors.csv \
            site; then
            echo "No generated daily artifacts changed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            "reports/${TODAY}.md" \
            "reports/news_details/${TODAY}" \
            "reports/source_iteration_${TODAY}.md" \
            "data/raw_items_${TODAY}.json" \
            config/source_candidates.yaml \
            config/source_health.yaml \
            data/market_close.csv \
            data/market_volume.csv \
            data/market_signals.csv \
            data/market_fetch_errors.csv \
            site
          git commit -m "chore: publish daily report for ${TODAY}" || exit 0
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Validate Vercel secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          [ -n "$VERCEL_TOKEN" ] || { echo "VERCEL_TOKEN is missing"; exit 1; }
          [ -n "$VERCEL_ORG_ID" ] || { echo "VERCEL_ORG_ID is missing"; exit 1; }
          [ -n "$VERCEL_PROJECT_ID" ] || { echo "VERCEL_PROJECT_ID is missing"; exit 1; }

      - name: Pull Vercel project settings
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy to Vercel production
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy --prod --yes --token="${{ secrets.VERCEL_TOKEN }}"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
